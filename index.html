const yen=(v)=>(Math.round(Number(v)||0)).toLocaleString("ja-JP")+" 円";
const num=(v)=>parseFloat(String(v).replace(/,/g,""))||0;
const fmt=(v)=>(Math.round(Number(v)||0)).toLocaleString("ja-JP");
const jDate=(s)=>{if(!s)return"";const d=new Date(s);return`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`};
const jYearMonth=(s)=>{if(!s)return"";const d=new Date(s);return`令和${d.getFullYear()-2018}年${d.getMonth()+1}月`};

const INIT={
  propType:"戸建",txType:"売主",address:"富山市〇〇町1-2-3",addressZip:"",

  gathering:"あり",gatheringPlace:"北陸銀行 〇〇支店",viviBank:"北陸銀行",

  taxRounding:"切り捨て",cityTax:"あり",

  taxAnnual:83574,taxBase:"4/1",overYear:"なし",
  mgmtMonthly:12000,repairMonthly:8000,mgmtClearMonths:"当月のみ",
  mgmtOtherLabel:"",mgmtOtherAmt:0,
  loanBalance:15000000,sBrokerTotal:600000,sBrokerPaid:300000,
  sProxy1:0,sProxy2:15000,sProxy3:0,sProxy4:0,sProxy5:50000,sProxy6:0,
  sCashLabel1:"印紙代",sCashAmt1:10000,sCashLabel2:"",sCashAmt2:0,
  sJuminCount:"1",sInkanCount:"1",sKenriCount:"1",
  sKosekiHuhyo:"表示",showInkanWarning:"表示",

  sellerBankName:"北陸銀行 富山駅前支店",sellerBankType:"普通",sellerBankNo:"1234567",sellerBankHolder:"売主 太郎",
  bBrokerTotal:600000,bBrokerPaid:0,loanUse:"あり",loanAmount:15000000,
  kinshoDT:"2026-03-10",kinshoTime:"10:00",kinshoPlace:"北陸銀行 〇〇支店",
  preMove:"あり",bJuminKinsho:"2",bInkanKinsho:"2",bOtherKinsho:"収入印紙 20,000円",
  bJuminSettle:"1",bInkanSettle:"0",bRegFee:250000,reformTotal:0,reformDepositYN:"なし",reformDepositAmt:0,
  bOtherProxy:0,bLoanFee:300000,bFireInsurance:150000,bMgmtFund:0,bTransferFee:1100,bOtherDraw:0,
  bCashLabel1:"印紙代",bCashAmt1:10000,bCashLabel2:"",bCashAmt2:0,
  bJuminTransfer:"0",bInkanTransfer:"0",
  staff:"ViVi 太郎",
};

function calcAll(d){
  const sDate=new Date(d.settlementDT);
  let uPrice=num(d.unitPrice);
  const oArea=num(d.officialArea),aArea=num(d.actualArea);
  if(uPrice===0&&oArea>0)uPrice=num(d.salePrice)/oArea;
  let fRem,rText="";
  if(uPrice>0&&aArea>0&&oArea>0){
    const newTotal=Math.floor(uPrice*aArea);
    fRem=newTotal-num(d.deposit);
    const diff=Math.round((aArea-oArea)*100)/100;
    rText=`実測面積は ${aArea.toFixed(2)}㎡（予定より${Math.abs(diff).toFixed(2)}㎡増減）\n新総額 ${fmt(newTotal)}円 － 手付金 ＝ 残代金 ${fmt(fRem)}円`;
  }else{fRem=Math.round(num(d.salePrice)-num(d.deposit));}
  const taxLabel=d.cityTax==="あり"?"固定資産税及び都市計画税":"固定資産税";
  const kMo=d.taxBase==="1/1"?1:4;
  let stYear=sDate.getFullYear();
  if(kMo===4&&sDate.getMonth()+1<4)stYear-=1;
  const startDate=new Date(stYear,kMo-1,1);
  const endDate=new Date(stYear+1,kMo-1,1);
  const tAnn=Math.round(num(d.taxAnnual));
  const totalDays=Math.round((endDate-startDate)/86400000);
  const sellerDays=Math.round((sDate-startDate)/86400000);
  const buyerDays=totalDays-sellerDays;
  const roundFn=d.taxRounding==="四捨五入"?Math.round:Math.floor;
  const tSel=roundFn(tAnn*(sellerDays/totalDays));
  let tBuy=tAnn-tSel,tNextYear=0;
  if(d.overYear==="あり"){tNextYear=tAnn;tBuy+=tNextYear;}
  const mBase=Math.round(num(d.mgmtMonthly)),rBase=Math.round(num(d.repairMonthly));
  const mOther=Math.round(num(d.mgmtOtherAmt));
  const mTot=mBase+rBase+mOther;
  const mgmtLabel=d.mgmtOtherLabel?`管理費・修繕積立金・${d.mgmtOtherLabel}`:"管理費等";
  const daysInMonth=new Date(sDate.getFullYear(),sDate.getMonth()+1,0).getDate();
  let mBuy=0,bDyM=0,mDly=0,rDly=0,mgmtRows=[];
  if(d.propType==="マンション"&&mTot>0){
    bDyM=daysInMonth-sDate.getDate()+1;
    mDly=Math.floor(mBase*(bDyM/daysInMonth));rDly=Math.floor(rBase*(bDyM/daysInMonth));
    const curMonthEnd=new Date(sDate.getFullYear(),sDate.getMonth()+1,0);
    const nm1Start=new Date(sDate.getFullYear(),sDate.getMonth()+1,1);
    const nm1End=new Date(sDate.getFullYear(),sDate.getMonth()+2,0);
    const nm2Start=new Date(sDate.getFullYear(),sDate.getMonth()+2,1);
    const nm2End=new Date(sDate.getFullYear(),sDate.getMonth()+3,0);
    mgmtRows.push({label:"当月　日割分",period:`${md(sDate)} ～ ${md(curMonthEnd)}`,days:`${bDyM}日`,mAmt:mDly,rAmt:rDly,oAmt:mOther>0?Math.floor(mOther*(bDyM/daysInMonth)):0});
    mBuy=mDly+rDly+(mOther>0?Math.floor(mOther*(bDyM/daysInMonth)):0);
    if(d.mgmtClearMonths==="翌月まで"||d.mgmtClearMonths==="翌々月まで"){mgmtRows.push({label:"翌月　1ヶ月分",period:`${md(nm1Start)} ～ ${md(nm1End)}`,days:"1ヶ月",mAmt:mBase,rAmt:rBase,oAmt:mOther});mBuy+=mTot;}
    if(d.mgmtClearMonths==="翌々月まで"){mgmtRows.push({label:"翌々月　1ヶ月分",period:`${md(nm2Start)} ～ ${md(nm2End)}`,days:"1ヶ月",mAmt:mBase,rAmt:rBase,oAmt:mOther});mBuy+=mTot;}
  }
  // 管理費：売主が支払う最終月（清算範囲に連動）
  let mgmtSellerLastMonth="";
  if(d.propType==="マンション"){
    const addMonth=d.mgmtClearMonths==="翌々月まで"?2:d.mgmtClearMonths==="翌月まで"?1:0;
    const tgt=new Date(sDate.getFullYear(),sDate.getMonth()+addMonth,1);
    mgmtSellerLastMonth=`令和${tgt.getFullYear()-2018}年${tgt.getMonth()+1}月`;
  }
  // 固定資産税：売主負担年度（起算日・越年に連動）
  const reiwaBase=stYear-2018;
  const taxSellerYearFull=d.overYear==="あり"
    ?`令和${reiwaBase}年度・令和${reiwaBase+1}年度`
    :`令和${reiwaBase}年度`;
  const reformTotal=Math.round(num(d.reformTotal));
  const reformDeposit=d.reformDepositYN==="あり"?Math.round(num(d.reformDepositAmt)):0;
  const reformBalance=Math.max(reformTotal-reformDeposit,0);
  const incomeTot=fRem+tBuy+mBuy;
  const loanBal=Math.round(num(d.loanBalance));
  const sBroker=Math.round(num(d.sBrokerTotal))-Math.round(num(d.sBrokerPaid));
  const sViViProxy=sBroker+Math.round(num(d.sProxy1))+Math.round(num(d.sProxy2))+Math.round(num(d.sProxy3))+Math.round(num(d.sProxy4))+Math.round(num(d.sProxy5))+Math.round(num(d.sProxy6));
  const sCash=Math.round(num(d.sCashAmt1))+Math.round(num(d.sCashAmt2));
  const aToS=incomeTot-sViViProxy;
  const bBroker=Math.round(num(d.bBrokerTotal))-Math.round(num(d.bBrokerPaid));
  const bViViProxy=bBroker+Math.round(num(d.bRegFee))+reformDeposit+Math.round(num(d.bOtherProxy));
  const bBankDraw=Math.round(num(d.bLoanFee))+Math.round(num(d.bFireInsurance))+Math.round(num(d.bMgmtFund))+Math.round(num(d.bTransferFee))+Math.round(num(d.bOtherDraw))+reformBalance;
  const bCash=Math.round(num(d.bCashAmt1))+Math.round(num(d.bCashAmt2));
  const tExpB=incomeTot+bViViProxy+bBankDraw+bCash;
  let selfFunds=0,surplus=0;
  if(d.loanUse==="あり"){const diff=tExpB-Math.round(num(d.loanAmount));selfFunds=diff>0?diff:0;surplus=diff<0?Math.abs(diff):0;}
  else{selfFunds=tExpB;}
  const overLoan=aToS<loanBal&&loanBal>0;
  const viviBank=d.viviBank==="北陸銀行"?"北陸銀行 富山南中央支店 普通 №5437740\n(名義) ViVi不動産株式会社":"富山第一銀行 富山南センター支店 普通 №054370\n(名義) ViVi不動産株式会社";
  const sellerBank=`${d.sellerBankName} ${d.sellerBankType} ${d.sellerBankNo}\n(名義) ${d.sellerBankHolder} 様`;
  return{fRem,rText,tBuy,tSel,tNextYear,tAnn,mBuy,mDly,rDly,mTot,mOther,bDyM,daysInMonth,mgmtRows,mgmtLabel,mgmtSellerLastMonth,taxSellerYearFull,
    incomeTot,loanBal,sBroker,sViViProxy,sCash,aToS,bBroker,bViViProxy,bBankDraw,bCash,
    tExpB,selfFunds,surplus,overLoan,shortfall:overLoan?loanBal-aToS:0,afterLoan:overLoan?0:aToS-loanBal,
    reformDeposit,reformBalance,sellerDays,buyerDays,totalDays,startDate,endDate,sDate,
    viviBank,sellerBank,taxLabel,stYear};
}

  sectionHead:{background:"#1a3a6b",color:"#fff",padding:"3px 8px",fontSize:10,fontWeight:"bold",marginTop:10,marginBottom:3,letterSpacing:1},

function DocHeader({d}){
  return(
    <div style={DOC.header}>
      <div>
        <div style={DOC.logo}>ViVi不動産株式会社<span style={DOC.logoSub}>ViVi Real Estate Co., Ltd.</span></div>
        <div style={{fontSize:9,color:"#555",marginTop:2}}>TEL：0120-145-151　担当：{d.staff}</div>
      </div>
      <div style={{textAlign:"right",fontSize:9,color:"#555"}}>
        <div>決済日：{jDate(d.settlementDT)}</div>
        <div>物件：{d.propType}　{d.addressZip?`〒${d.addressZip.slice(0,3)}-${d.addressZip.slice(3)} `:""}{d.address}</div>
      </div>
    </div>
  );
}

function TRow({label,value,bold,indent,sub,total,warn,colSpan,wrap}){
  const bg=total?"#1a3a6b":warn?"#fff0f0":"transparent";
  const col=total?"#fff":warn?"#8b0000":"#111";
  return(
    <tr style={{background:bg,color:col}}>
      <td style={{...DOC.td,paddingLeft:indent?20:6,fontWeight:bold||total?"bold":"normal",fontSize:total?12:11,color:col,wordBreak:"break-all"}} colSpan={colSpan}>
        {label}{sub&&<span style={{fontSize:9,fontWeight:"normal",marginLeft:4,color:total?"#cce":"#888"}}>{sub}</span>}
      </td>
      {!colSpan&&<td style={{...DOC.tdRight,fontWeight:bold||total?"bold":"normal",fontSize:total?12:11,color:col,whiteSpace:wrap?"normal":"nowrap",wordBreak:wrap?"break-all":"normal"}}>{value}</td>}
    </tr>
  );
}

      {num(d.sJuminCount)>0&&<div>□　住民票　{d.sJuminCount}通</div>}
      {d.sKosekiHuhyo==="表示"&&<div>□　戸籍の附票の写し</div>}
      {num(d.sInkanCount)>0&&<div>□　印鑑証明書　{d.sInkanCount}通　<span style={{color:"#8b0000"}}>※必ず残金決済時より３か月以内のものをご用意ください</span></div>}
      {c.sCash>0&&<div style={{color:"#8b0000",fontWeight:"bold"}}>□　現金　{fmt(c.sCash)}円（{d.sCashLabel1}{d.sCashLabel2?`・${d.sCashLabel2}`:""}）</div>}
      <div>{d.propType==="戸建"?"□　カギ・建築確認・図面一式等":"□　カギ・管理規約・建築確認等"}</div>
      {d.sExtraLabel1&&<div>□　{d.sExtraLabel1}</div>}
      {d.sExtraLabel2&&<div>□　{d.sExtraLabel2}</div>}

  return(

      <div><span style={DOC.addressee}>{d.sellerName} 様</span></div>

        <div style={{fontSize:10,fontWeight:"bold",color:"#1a3a6b",marginBottom:3,marginTop:4}}>【本人面談時のご持参いただくもの】</div>
        <div style={{fontSize:9,color:"#888",marginBottom:3}}>※残金決済時に必要なものと同じものをお持ちください。</div>
        <SellerItems d={d} c={c}/>
      </>}
      <div style={DOC.sectionHead}>■ 残金決済について</div>

          </>:<>

            <tr><td colSpan={2} style={{...DOC.td,color:"#8b0000",fontSize:10}}>※本取引は振込手続き等にて行いますので、お集まりいただく必要はございません。</td></tr>
          </>}
        </tbody>
      </table>
      <div style={DOC.sectionHead}>■ 当日ご持参いただくもの</div>
      {d.gathering==="あり"
        ?<SellerItems d={d} c={c}/>
        :<div style={{...DOC.noteBox,marginBottom:6,fontSize:10,color:"#555"}}>※本取引は振込手続き等にて行いますので、お持ちいただくものはございません。</div>
      }
      {d.showInkanWarning==="表示"&&<>
        <div style={DOC.sectionHeadRed}>【重要】印鑑証明書に関するご注意</div>
        <div style={DOC.warningBox}>お住み替え等で住所を移転される場合は、必ず【ご移転前（現住所）の印鑑証明書】をご取得ください。<br/>※引越しにより住所が変更になると「住所変更登記」が必要となり、別途費用が発生いたします。</div>
      </>}
      <div style={DOC.sectionHead}>▼ {c.taxLabel}の清算について</div>
      <div style={{...DOC.infoBox,marginBottom:6}}>

        {d.propType==="マンション"&&c.mgmtSellerLastMonth&&(
          <div style={{marginTop:4}}>また、{c.mgmtLabel}についても日割り清算させていただきますので、<strong>{c.mgmtSellerLastMonth}分まで</strong>売主様がお支払いください。</div>
        )}
      </div>
      <div style={DOC.sectionHead}>▼ 火災保険について</div>
      <div style={DOC.infoBox}>
        {d.propType==="土地"
          ?"（建物を解体した場合）解体が終了した日付での火災保険の解約手続きを予めお願い申し上げます。"
          :"お引渡し日付での火災保険の解約手続きを予めお願い申し上げます。"
        }<br/>（長期契約であれば解約返戻金があると思われます。）

const iS={width:"100%",padding:"4px 6px",fontSize:11,border:"0.5px solid #ccc",borderRadius:4,background:"#fff",color:"#222",boxSizing:"border-box"};

const DI=({val,onChange})=><input type="date" value={val} onChange={e=>onChange(e.target.value)} style={iS}/>;
const SI=({val,onChange,opts})=><select value={val} onChange={e=>onChange(e.target.value)} style={iS}>{opts.map(o=><option key={o}>{o}</option>)}</select>;
const Sec=({label,color})=><div style={{fontSize:10,fontWeight:"bold",padding:"3px 6px",marginTop:8,marginBottom:2,background:color||"#eee",borderRadius:3,borderLeft:"3px solid #999"}}>{label}</div>;

const TB=({val,onChange,opts})=><div style={{display:"flex",borderRadius:4,overflow:"hidden",border:"1px solid #ccc"}}>{opts.map(o=><button key={o} onClick={()=>onChange(o)} style={{flex:1,padding:"5px 0",fontSize:10,border:"none",cursor:"pointer",background:val===o?"#1a3a6b":"#f5f5f5",color:val===o?"#fff":"#333",fontWeight:val===o?"bold":"normal"}}>{o}</button>)}</div>;

        <div style={{display:"flex",gap:3}}><F label="金消日" half><DI val={d.kinshoDT} onChange={set("kinshoDT")}/></F><F label="時間" half><input type="time" value={d.kinshoTime} onChange={e=>set("kinshoTime")(e.target.value)} style={iS}/></F></div>
        <F label="金消場所"><TI val={d.kinshoPlace} onChange={set("kinshoPlace")}/></F>
      </>}
      <F label="新住所への事前移転"><TB val={d.preMove} onChange={set("preMove")} opts={["あり","なし"]}/></F>
      <F label="金消用 住民票通数"><SI val={String(d.bJuminKinsho)} onChange={set("bJuminKinsho")} opts={["0","1","2","3"]}/></F>
      <F label="金消用 印鑑証明通数"><SI val={String(d.bInkanKinsho)} onChange={set("bInkanKinsho")} opts={["0","1","2","3"]}/></F>
      <F label="金消用 その他持参物"><TI val={d.bOtherKinsho} onChange={set("bOtherKinsho")}/></F>
      {d.gathering==="あり"?<>
        <F label="決済用 住民票通数"><SI val={String(d.bJuminSettle)} onChange={set("bJuminSettle")} opts={["0","1","2","3"]}/></F>
        <F label="決済用 印鑑証明通数"><SI val={String(d.bInkanSettle)} onChange={set("bInkanSettle")} opts={["0","1","2","3"]}/></F>
      </>:<>
        <F label="振込決済用 住民票通数"><SI val={String(d.bJuminTransfer)} onChange={set("bJuminTransfer")} opts={["0","1","2","3"]}/></F>
        <F label="振込決済用 印鑑証明通数"><SI val={String(d.bInkanTransfer)} onChange={set("bInkanTransfer")} opts={["0","1","2","3"]}/></F>
      </>}
      <F label="【代行】登記費用(円)"><NI val={d.bRegFee} onChange={set("bRegFee")}/></F>
      <F label="リフォーム代(総額)"><NI val={d.reformTotal} onChange={set("reformTotal")}/></F>
      <F label="決済時リフォーム手付"><TB val={d.reformDepositYN} onChange={set("reformDepositYN")} opts={["なし","あり"]}/></F>
      {d.reformDepositYN==="あり"&&<F label="手付金額(円)"><NI val={d.reformDepositAmt} onChange={set("reformDepositAmt")}/></F>}
      <F label="【代行】その他代行費用"><NI val={d.bOtherProxy} onChange={set("bOtherProxy")}/></F>
      <F label="【引落】ローン諸費用"><NI val={d.bLoanFee} onChange={set("bLoanFee")}/></F>
      <F label="【引落】火災保険料"><NI val={d.bFireInsurance} onChange={set("bFireInsurance")}/></F>
      <F label="【引落】管理基金等"><NI val={d.bMgmtFund} onChange={set("bMgmtFund")}/></F>
      <F label="【引落】振込手数料"><NI val={d.bTransferFee} onChange={set("bTransferFee")}/></F>
      <F label="【引落】その他"><NI val={d.bOtherDraw} onChange={set("bOtherDraw")}/></F>
      <div style={{display:"flex",gap:3}}><F label="現金名目①" half><TI val={d.bCashLabel1} onChange={set("bCashLabel1")}/></F><F label="金額①" half><NI val={d.bCashAmt1} onChange={set("bCashAmt1")}/></F></div>
      <div style={{display:"flex",gap:3}}><F label="現金名目②" half><TI val={d.bCashLabel2} onChange={set("bCashLabel2")}/></F><F label="金額②" half><NI val={d.bCashAmt2} onChange={set("bCashAmt2")}/></F></div>
      <Sec label="その他設定"/>
      <F label="当社担当者名"><TI val={d.staff} onChange={set("staff")}/></F>
      <div style={{height:20}}/>
    </div>
  );

  // プレビューパネル（PC・スマホ共通）
  const PreviewPanel=(
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",height:"100%"}}>
      <div style={{display:"flex",gap:6,padding:"6px 10px",flexWrap:"wrap",background:"#1a3a6b",alignItems:"center"}}>
        {[["残代金",c.fRem,false],["売主受取(C)",c.aToS,c.overLoan],["買主総額(A)",c.tExpB,false],["自己資金",c.selfFunds,false],[d.cityTax==="あり"?"固定資産税等清算":"固定資産税清算",c.tBuy,false]].map(([lbl,val,warn])=>(
          <div key={lbl} style={{flex:"1 1 70px",padding:"3px 6px",minWidth:65,background:warn?"#8b0000":"rgba(255,255,255,0.15)",borderRadius:4,border:"1px solid rgba(255,255,255,0.3)"}}>
            <div style={{fontSize:8,color:"#cce"}}>{lbl}</div>
            <div style={{fontSize:11,fontWeight:"bold",color:"#fff",fontVariantNumeric:"tabular-nums"}}>{fmt(val)}円</div>
          </div>
        ))}
        {c.overLoan&&<div style={{flex:"0 0 100%",fontSize:10,color:"#ffc",background:"#8b0000",padding:"2px 10px",borderRadius:4}}>⚠ オーバーローン：売主様に {fmt(c.shortfall)}円 の持ち出しが発生します</div>}
      </div>
      <div style={{display:"flex",background:"#f0f0f0",borderBottom:"1px solid #ccc",paddingLeft:4,overflowX:"auto",flexShrink:0}}>
        {TABS.map((t,i)=>(
          <button key={t} onClick={()=>setTab(i)} style={{padding:"6px 8px",fontSize:sp?9:11,background:i===tab?"#fff":"transparent",border:"none",borderTop:i===tab?"2px solid #1a3a6b":"2px solid transparent",borderRight:"1px solid #ddd",cursor:"pointer",fontWeight:i===tab?"bold":"normal",color:i===tab?"#1a3a6b":"#555",whiteSpace:"nowrap"}}>{t}</button>
        ))}
        <div style={{flex:1}}/>
        {!sp&&<button onClick={()=>window.print()} style={{fontSize:11,margin:"3px 8px",padding:"3px 12px",border:"1px solid #aaa",borderRadius:4,background:"#fff",cursor:"pointer",color:"#333",fontWeight:"bold"}}>🖨 印刷/PDF</button>}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:sp?"8px":"14px 18px",background:"#d0d0d0"}}>
        <div id="print-area" style={{maxWidth:680,margin:"0 auto",boxShadow:"0 2px 12px rgba(0,0,0,0.25)"}}>
          <TabComp d={d} c={c}/>
        </div>
      </div>
    </div>
  );

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100vh",background:"#e8e8e8",fontSize:12}}>
      {sp?(
        // スマホ版
        <>
          <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
            {spTab==="input"&&InputPanel}
            {spTab==="preview"&&PreviewPanel}
          </div>
          <div style={{display:"flex",background:"#1a3a6b",borderTop:"2px solid #0d2a52",height:52,flexShrink:0}}>
            <button onClick={()=>setSpTab("input")} style={{flex:1,background:spTab==="input"?"#fff":"transparent",color:spTab==="input"?"#1a3a6b":"#cce",border:"none",cursor:"pointer",fontSize:14,fontWeight:"bold"}}>📝 入力</button>
            <button onClick={()=>setSpTab("preview")} style={{flex:1,background:spTab==="preview"?"#fff":"transparent",color:spTab==="preview"?"#1a3a6b":"#cce",border:"none",cursor:"pointer",fontSize:14,fontWeight:"bold"}}>👁 確認</button>
          </div>
        </>
      ):(
        // PC版
        <div style={{display:"flex",flex:1,overflow:"hidden"}}>
          {InputPanel}
          {PreviewPanel}
        </div>
      )}

      {showSaveDlg&&(
        <div style={{position:"fixed",top:0,left:0,width:"100%",height:"100%",background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}}>
          <div style={{background:"#fff",borderRadius:8,padding:"24px",width:"90%",maxWidth:360,boxShadow:"0 4px 20px rgba(0,0,0,0.3)"}}>
            <div style={{fontSize:14,fontWeight:"bold",marginBottom:12,color:"#1a3a6b"}}>💾 名前をつけて保存</div>
            <input value={saveName} onChange={e=>setSaveName(e.target.value)} placeholder={`${d.sellerName}→${d.buyerName} (${d.settlementDT})`} style={{...iS,marginBottom:16,fontSize:12}}/>
            <div style={{display:"flex",gap:8}}>
              <button onClick={doSave} style={{flex:1,padding:"8px",background:"#1a3a6b",color:"#fff",border:"none",borderRadius:4,cursor:"pointer",fontWeight:"bold",fontSize:12}}>保存する</button>
              <button onClick={()=>{setShowSaveDlg(false);setSaveName("");}} style={{flex:1,padding:"8px",background:"#888",color:"#fff",border:"none",borderRadius:4,cursor:"pointer",fontSize:12}}>キャンセル</button>
            </div>
          </div>
        </div>
      )}

      {showHist&&(
        <div style={{position:"fixed",top:0,left:0,width:"100%",height:"100%",background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}}>
          <div style={{background:"#fff",borderRadius:8,padding:"24px",width:"90%",maxWidth:480,maxHeight:"80vh",display:"flex",flexDirection:"column",boxShadow:"0 4px 20px rgba(0,0,0,0.3)"}}>
            <div style={{fontSize:14,fontWeight:"bold",marginBottom:12,color:"#1a3a6b"}}>📂 保存済み一覧</div>
            {saved.length===0?(
              <div style={{color:"#888",fontSize:12,textAlign:"center",padding:"20px 0"}}>保存されているデータはありません</div>
            ):(
              <div style={{overflowY:"auto",flex:1}}>
                {saved.map(item=>(
                  <div key={item.id} style={{border:`1px solid ${item.id===curId?"#1a3a6b":"#ddd"}`,borderRadius:6,padding:"10px 12px",marginBottom:8,background:item.id===curId?"#eef3fb":"#fafafa"}}>
                    <div style={{fontWeight:"bold",fontSize:12,marginBottom:2,color:"#1a3a6b"}}>{item.name}</div>
                    <div style={{fontSize:10,color:"#888",marginBottom:8}}>保存日時：{item.savedAt}</div>
                    <div style={{display:"flex",gap:6}}>
                      <button onClick={()=>doLoad(item)} style={{flex:1,padding:"5px",background:"#1a3a6b",color:"#fff",border:"none",borderRadius:4,cursor:"pointer",fontSize:11,fontWeight:"bold"}}>📥 読み込む</button>
                      {delConf===item.id?(
                        <><button onClick={()=>doDel(item.id)} style={{flex:1,padding:"5px",background:"#8b0000",color:"#fff",border:"none",borderRadius:4,cursor:"pointer",fontSize:11,fontWeight:"bold"}}>本当に削除</button><button onClick={()=>setDelConf(null)} style={{flex:1,padding:"5px",background:"#888",color:"#fff",border:"none",borderRadius:4,cursor:"pointer",fontSize:11}}>キャンセル</button></>
                      ):(
                        <button onClick={()=>setDelConf(item.id)} style={{padding:"5px 12px",background:"#eee",color:"#666",border:"1px solid #ccc",borderRadius:4,cursor:"pointer",fontSize:11}}>🗑 削除</button>
                      )}
                    </div>
                  </div>
                ))}
              </div>
            )}
            <button onClick={()=>{setShowHist(false);setDelConf(null);}} style={{marginTop:12,padding:"8px",background:"#888",color:"#fff",border:"none",borderRadius:4,cursor:"pointer",fontSize:12}}>閉じる</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
